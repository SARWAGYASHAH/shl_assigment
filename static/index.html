<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHL Assessment Recommender</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a2035;
            --bg-glass: rgba(26, 32, 53, 0.7);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --accent-secondary: #8b5cf6;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(148, 163, 184, 0.1);
            --success: #10b981;
            --user-bubble: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --bot-bubble: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* Animated background */
        .bg-gradient {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(16, 185, 129, 0.04) 0%, transparent 50%);
            z-index: 0;
        }

        .app-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            background: rgba(10, 14, 26, 0.8);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo {
            width: 42px;
            height: 42px;
            background: var(--user-bubble);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: -0.5px;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .header-info h1 {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .header-info p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            font-size: 12px;
            color: var(--success);
            font-weight: 500;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* Chat area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar { width: 5px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
        }

        /* Welcome screen */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            gap: 20px;
            animation: fadeIn 0.6s ease;
        }

        .welcome-icon {
            width: 80px;
            height: 80px;
            background: var(--user-bubble);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        .welcome h2 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #f1f5f9, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome p {
            color: var(--text-secondary);
            max-width: 400px;
            line-height: 1.6;
            font-size: 14px;
        }

        .quick-prompts {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }

        .quick-prompt {
            padding: 10px 18px;
            border-radius: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Inter', sans-serif;
        }

        .quick-prompt:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        /* Messages */
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: slideUp 0.35s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.bot { align-self: flex-start; }

        .message-avatar {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        }

        .message.bot .message-avatar {
            background: var(--bg-card);
            border: 1px solid var(--border);
        }

        .message-content {
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 14px;
        }

        .message.user .message-content {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
            color: #fff;
        }

        .message.bot .message-content {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: var(--text-primary);
        }

        .message-content strong { font-weight: 600; }

        .message-content p { margin-bottom: 8px; }
        .message-content p:last-child { margin-bottom: 0; }

        /* Recommendation cards */
        .rec-cards {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        .rec-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 12px;
            background: rgba(59, 130, 246, 0.06);
            border: 1px solid rgba(59, 130, 246, 0.12);
            transition: all 0.2s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .rec-card:hover {
            background: rgba(59, 130, 246, 0.12);
            border-color: rgba(59, 130, 246, 0.25);
            transform: translateX(4px);
        }

        .rec-type {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .rec-type.K { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .rec-type.S { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .rec-type.A { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .rec-type.P { background: rgba(139, 92, 246, 0.15); color: #a78bfa; }
        .rec-type.B { background: rgba(236, 72, 153, 0.15); color: #f472b6; }

        .rec-info { flex: 1; min-width: 0; }
        .rec-name {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .rec-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .rec-arrow {
            color: var(--text-muted);
            font-size: 16px;
            flex-shrink: 0;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 12px;
            align-self: flex-start;
            animation: fadeIn 0.3s ease;
        }

        .typing-dots {
            padding: 16px 20px;
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typingBounce 1.4s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Input area */
        .input-area {
            padding: 16px 24px 24px;
            border-top: 1px solid var(--border);
            backdrop-filter: blur(20px);
            background: rgba(10, 14, 26, 0.8);
        }

        .input-container {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 6px 6px 6px 18px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .input-container:focus-within {
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .input-container textarea {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            resize: none;
            max-height: 120px;
            padding: 10px 0;
            line-height: 1.5;
        }

        .input-container textarea::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: var(--user-bubble);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 15px var(--accent-glow); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .send-btn svg {
            width: 18px;
            height: 18px;
        }

        .input-hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* Type labels */
        .type-legend {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .type-label {
            font-size: 10px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .type-label span {
            width: 8px;
            height: 8px;
            border-radius: 3px;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .app-container { max-width: 100%; }
            .chat-area { padding: 16px; }
            .input-area { padding: 12px 16px 16px; }
            .message { max-width: 92%; }
            .quick-prompts { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="app-container">
        <div class="header">
            <div class="header-left">
                <div class="logo">SHL</div>
                <div class="header-info">
                    <h1>Assessment Recommender</h1>
                    <p>AI-powered SHL test selection</p>
                </div>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                Online
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="welcome" id="welcome">
                <div class="welcome-icon">&#x1F9E0;</div>
                <h2>Find the Right Assessment</h2>
                <p>Tell me about the role you're hiring for, and I'll recommend the best SHL assessments to evaluate your candidates.</p>
                <div class="quick-prompts">
                    <button class="quick-prompt" onclick="sendQuickPrompt(this)">Hiring a Java developer</button>
                    <button class="quick-prompt" onclick="sendQuickPrompt(this)">Senior data scientist with Python</button>
                    <button class="quick-prompt" onclick="sendQuickPrompt(this)">Entry-level sales representative</button>
                    <button class="quick-prompt" onclick="sendQuickPrompt(this)">Compare OPQ32 vs Verify G+</button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-container">
                <textarea id="userInput" rows="1" placeholder="Describe the role you're hiring for..." 
                    onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="input-hint">Press Enter to send &middot; Shift+Enter for new line</div>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcome = document.getElementById('welcome');
        
        let conversationHistory = [];
        let isLoading = false;

        const TYPE_LABELS = {
            'K': 'Knowledge',
            'S': 'Simulation',
            'A': 'Ability',
            'P': 'Personality',
            'B': 'Behavioral'
        };

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function sendQuickPrompt(btn) {
            userInput.value = btn.textContent;
            sendMessage();
        }

        function formatMarkdown(text) {
            // Bold
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // Italic
            text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
            // Line breaks
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        function addMessage(role, content, recommendations = []) {
            if (welcome) welcome.style.display = 'none';

            const div = document.createElement('div');
            div.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.innerHTML = role === 'user' ? '&#x1F464;' : '&#x1F916;';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = formatMarkdown(content);

            // Add recommendation cards
            if (recommendations.length > 0) {
                const cardsDiv = document.createElement('div');
                cardsDiv.className = 'rec-cards';

                recommendations.forEach(rec => {
                    const card = document.createElement('a');
                    card.className = 'rec-card';
                    card.href = rec.url;
                    card.target = '_blank';
                    card.rel = 'noopener';
                    card.innerHTML = `
                        <div class="rec-type ${rec.test_type}">${rec.test_type}</div>
                        <div class="rec-info">
                            <div class="rec-name">${rec.name}</div>
                            <div class="rec-meta">${TYPE_LABELS[rec.test_type] || rec.test_type} Test</div>
                        </div>
                        <div class="rec-arrow">&rarr;</div>
                    `;
                    cardsDiv.appendChild(card);
                });

                contentDiv.appendChild(cardsDiv);

                // Add type legend
                const legend = document.createElement('div');
                legend.className = 'type-legend';
                const usedTypes = [...new Set(recommendations.map(r => r.test_type))];
                usedTypes.forEach(t => {
                    const colors = { K: '#60a5fa', S: '#34d399', A: '#fbbf24', P: '#a78bfa', B: '#f472b6' };
                    legend.innerHTML += `<span class="type-label"><span style="background:${colors[t] || '#999'}"></span>${t} = ${TYPE_LABELS[t] || t}</span>`;
                });
                contentDiv.appendChild(legend);
            }

            div.appendChild(avatar);
            div.appendChild(contentDiv);
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing-indicator';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="message-avatar" style="background: var(--bg-card); border: 1px solid var(--border);">&#x1F916;</div>
                <div class="typing-dots"><span></span><span></span><span></span></div>
            `;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isLoading) return;

            isLoading = true;
            sendBtn.disabled = true;
            userInput.value = '';
            userInput.style.height = 'auto';

            addMessage('user', text);
            conversationHistory.push({ role: 'user', content: text });
            showTyping();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: conversationHistory })
                });

                const data = await response.json();
                hideTyping();

                conversationHistory.push({ role: 'assistant', content: data.reply });
                addMessage('bot', data.reply, data.recommendations || []);

                if (data.end_of_conversation) {
                    userInput.placeholder = 'Conversation complete. Refresh to start over.';
                    userInput.disabled = true;
                    sendBtn.disabled = true;
                    return;
                }
            } catch (err) {
                hideTyping();
                addMessage('bot', 'Sorry, I encountered an error. Please try again.');
                console.error(err);
            }

            isLoading = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    </script>
</body>
</html>
